site_name: cub3D Guide
site_description: 42 Tokyo cub3D プロジェクトの解説サイト（超初心者向け）

docs_dir: docs
site_dir: site

theme:
  name: material
  language: ja
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: ダークモードへ
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: ライトモードへ
  font:
    text: Noto Sans JP
    code: JetBrains Mono
  icon:
    logo: material/cube-outline
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: false
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang:
        - ja
        - en

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - js/video-control.js
  - js/mermaid-override.js
  - js/user-notes.js

nav:
  - ホーム: index.md
  - 00. プログラム全体の流れ: 00-main-flow.md
  - 01. 概要とビルド: 01-overview.md
  - 02. パーサー: 02-parser.md
  - 03. レイキャスティングとは: 03-raycasting.md
  - 04. DDA アルゴリズム: 04-dda.md
  - 05. カメラと魚眼補正: 05-camera.md
  - 06. レンダリング: 06-rendering.md
  - 07. 入力処理: 07-input.md
  - 08. メモリ管理: 08-memory.md
  - 09. 実際のバグと修正: 09-debugging.md
  - 🎓 評価対策: eval.md
  - 📚 用語集: glossary.md
